<svg width="700" height="640" viewBox="0 0 700 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444" stroke-width="1.5"/>
    </marker>
  </defs>
  <rect width="700" height="640" fill="#ffffff"/>

  <rect x="250" y="20" width="200" height="44" rx="8" fill="#f1efe8" stroke="#888780"/>
  <text x="350" y="47" text-anchor="middle" font-size="14">User browser</text>
  <line x1="350" y1="64" x2="350" y2="100" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="350" y="86" text-anchor="middle" font-size="11" fill="#5f5e5a">http(s)://public-ip</text>

  <rect x="250" y="100" width="200" height="44" rx="8" fill="#f1efe8" stroke="#888780"/>
  <text x="350" y="127" text-anchor="middle" font-size="14">Cloud VM (public IP)</text>
  <line x1="350" y1="144" x2="350" y2="228" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="350" y="222" text-anchor="middle" font-size="11" fill="#5f5e5a">port 80</text>

  <rect x="70" y="170" width="560" height="300" rx="20" fill="#e1f5ee" stroke="#0f6e56"/>
  <text x="95" y="198" font-size="14" font-weight="bold" fill="#085041">Docker bridge network (chat-network)</text>

  <rect x="250" y="228" width="200" height="56" rx="12" fill="#cecbf6" stroke="#534ab7"/>
  <text x="350" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="#26215c">nginx (chat-nginx)</text>
  <text x="350" y="268" text-anchor="middle" font-size="11" fill="#3c3489">reverse proxy, port 80</text>

  <line x1="300" y1="284" x2="195" y2="340" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="205" y="315" text-anchor="middle" font-size="11" fill="#5f5e5a">location /</text>
  <line x1="400" y1="284" x2="505" y2="340" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="490" y="315" text-anchor="middle" font-size="11" fill="#5f5e5a">location /ws</text>

  <rect x="95" y="340" width="200" height="56" rx="12" fill="#f5c4b3" stroke="#993c1d"/>
  <text x="195" y="362" text-anchor="middle" font-size="14" font-weight="bold" fill="#4a1b0c">frontend/ volume</text>
  <text x="195" y="380" text-anchor="middle" font-size="11" fill="#712b13">static index.html</text>

  <rect x="405" y="340" width="200" height="56" rx="12" fill="#f4c0d1" stroke="#993556"/>
  <text x="505" y="362" text-anchor="middle" font-size="14" font-weight="bold" fill="#4b1528">backend (chat-backend)</text>
  <text x="505" y="380" text-anchor="middle" font-size="11" fill="#72243e">FastAPI + uvicorn :8000</text>

  <text x="505" y="418" text-anchor="middle" font-size="11" fill="#5f5e5a">Upgrade / Connection headers</text>
  <line x1="505" y1="396" x2="505" y2="430" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="405" y="430" width="200" height="26" rx="6" fill="#f1efe8" stroke="#888780"/>
  <text x="505" y="447" text-anchor="middle" font-size="10" fill="#2c2c2a">proxy_pass http://backend:8000</text>

  <line x1="350" y1="470" x2="350" y2="510" stroke="#444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="200" y="510" width="300" height="56" rx="12" fill="#f1efe8" stroke="#888780"/>
  <text x="350" y="532" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c2c2a">GitHub Actions CI/CD</text>
  <text x="350" y="550" text-anchor="middle" font-size="11" fill="#5f5e5a">SSH deploy on push to main</text>

  <text x="350" y="600" text-anchor="middle" font-size="11" fill="#888780">docker-compose.yml defines both services on one bridge network;</text>
  <text x="350" y="616" text-anchor="middle" font-size="11" fill="#888780">Docker's internal DNS resolves "backend" to the FastAPI container's IP.</text>
</svg>
